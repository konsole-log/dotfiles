[colors]
background = #282828
background-alt = #3c3836
foreground = #ebdbb2
primary = #fabd2f
secondary = #83a598
alert = #fb4934
disabled = #7c6f64
green = #b8bb26
blue = #83a598
aqua = #8ec07c
orange = #fe8019
purple = #d3869b
red = #fb4934
yellow = #fabd2f
white = #fbf1c7

[bar/bar]
monitor=eDP-1
width = 100%
height = 24
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
line-size = 2
border-size = 0
border-color = ${colors.white}
padding-left = 2
padding-right = 2
fixed-center = true
module-margin = 1 
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=12;2
modules-left = xworkspaces 
modules-center = date
modules-right = pulseaudio memory cpu brightness battery wlan logout
cursor-click = pointer
cursor-scroll = default
enable-ipc = true
wm-restack = i3

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 98
; format-charging-underline=${colors.purple}
; format-discharging-underline=${colors.purple}
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
label-charging = %percentage:1%%
label-discharging = %percentage:1%%
label-full = 100%
ramp-capacity-foreground = ${colors.white}
ramp-capacity-0 = %{T2}¾░ü╗%{T-}
ramp-capacity-1 = %{T2}¾░ü╝%{T-}
ramp-capacity-2 = %{T2}¾░üĮ%{T-}
ramp-capacity-3 = %{T2}¾░üŠ%{T-}
ramp-capacity-4 = %{T2}¾░ü┐%{T-}
ramp-capacity-5 = %{T2}¾░éĆ%{T-}
ramp-capacity-6 = %{T2}¾░éü%{T-}
ramp-capacity-7 = %{T2}¾░éé%{T-}
ramp-capacity-8 = %{T2}¾░ü╣%{T-}
; charge=%{F#fb1f1c7}%{T2}ŅīĢ %{T-}%{F-}
animation-charging-0 = %{T2}¾░éå%{T-}
animation-charging-1 = %{T2}¾░éć%{T-}
animation-charging-2 = %{T2}¾░éł%{T-}
animation-charging-3 = %{T2}¾░óØ%{T-}
animation-charging-4 = %{T2}¾░éē%{T-}
animation-charging-5 = %{T2}¾░ó×%{T-}
animation-charging-6 = %{T2}¾░éŗ%{T-}
animation-charging-7 = %{T2}¾░éŗ%{T-}
animation-charging-framerate = 750

[module/xworkspaces]
type = internal/xworkspaces

label-active = %index%
label-active-underline = ${colors.white}
label-active-foreground=${colors.white}
label-active-padding = 1

label-occupied = %index%
label-occupied-padding = 1
label-occupied-foreground=${colors.disabled}
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = %{T2}¾░ĢŠ %{T-}
format-volume-prefix-foreground = ${colors.white}
format-volume = <label-volume>
label-volume = %percentage:3%%
label-muted = %{T2}¾░¢ü %{T-}
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 0.5
format-prefix=%{T2}Ņē”%{T-}
format-prefix-foreground = ${colors.white}
label = %percentage_used:3%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = %{T2}’ŗø%{T-}
format-prefix-foreground = ${colors.white}
label = %percentage:3%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 2.0
format-connected = <ramp-signal>
format-disconnected = %{T2}¾░żŁ %{T-}
format-disconnected-foreground = ${colors.disabled}
ramp-signal-0=%{T2}¾░ż» %{T-}
ramp-signal-1 = %{T2}¾░ż¤ %{T-}
ramp-signal-2 = %{T2}¾░żó %{T-}
ramp-signal-3 = %{T2}¾░żź %{T-}
ramp-signal-4 = %{T2}¾░ż© %{T-}
ramp-signal-5 = %{T2}¾░ż© %{T-}

[module/brightness]
type = internal/backlight
card = intel_backlight
enable-scroll = true
format-prefix = %{T2}¾░Ź╣%{T-}
label = %percentage:3%%
scroll-up=  brightnessctl set +2%
scroll-down = brightnessctl set 2%-

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}

[module/logout]
type = custom/text
content=%{T2}’Ćæ%{T-}
content-foreground=${colors.white}
click-left = ~/.config/i3/power.sh logout

[settings]
screenchange-reload = true
pseudo-transparency = true

; [module/bluetooth]
; type = custom/script
; exec = ~/.config/polybar/bluetooth.sh
; interval = 5
; format = <label>
; label = %output%
; click-left = blueman-manager
; click-right = ~/.config/polybar/bluetooth-toggle.sh
;

; vim:ft=dosini
