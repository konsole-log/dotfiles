include-file = ~/dotfiles/polybar/bottomModules.ini
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Modern i3-style Bottom Bar
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/status]
monitor = eDP-1
bottom = true
override-redirect = false
wm-restack = i3
enable-ipc = true

width = 100%
height = 26

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-size = 0

padding-left = 1
padding-right = 1

module-margin = 1
fixed-center = true

font-0 = JetBrainsMono Nerd Font:size=9:style=Bold;2
font-1 = JetBrainsMono Nerd Font:size=10;2
font-2 = JetBrainsMono Nerd Font:size=11;2

modules-left = xworkspaces
modules-center = xwindow
modules-right = wlan pulseaudio brightness memory battery date

cursor-click = pointer
cursor-scroll = default


